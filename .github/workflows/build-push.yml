name: Build and Push to ECR

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: latest
        run: |
          IMAGE_URI_LATEST=$ECR_REGISTRY/article-platform:latest
          IMAGE_URI_SHA=$ECR_REGISTRY/article-platform:${{ github.sha }}

          # build image
          docker build -t $IMAGE_URI_LATEST .

          # tag same image with commit SHA
          docker tag $IMAGE_URI_LATEST $IMAGE_URI_SHA

          # push both tags
          docker push $IMAGE_URI_LATEST
          docker push $IMAGE_URI_SHA
