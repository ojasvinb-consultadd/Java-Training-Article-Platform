name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/article-platform
            
            # 1. Authenticate Docker to ECR
            # This logs the EC2 instance into ECR for a temporary session
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            
            # 2. Pull the new image
            docker pull ${{ secrets.ECR_REGISTRY }}/article-platform:latest
            
            # 3. Restart containers
            # We use force-recreate to ensure the old container is nuked and the new image is used
            docker compose -f compose.prod.yml up -d --force-recreate
