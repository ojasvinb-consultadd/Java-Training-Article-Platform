name: Deploy to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/article-platform

            # 1. Login to ECR
              aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
              
              # 2. Define IMAGE_URI
              IMAGE_URI=${{ secrets.ECR_REGISTRY }}/article-platform:${{ github.sha }}
              
              # 3. Restart stack with explicit env injection
              docker compose -f compose.prod.yml down
              docker container prune -f
              
              IMAGE_URI=$IMAGE_URI docker compose -f compose.prod.yml up -d --force-recreate
              
              # 4. Restart ngrok cleanly
              pkill ngrok || true
              nohup ngrok http 80 > ngrok.log 2>&1 &