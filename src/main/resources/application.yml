spring:
  application:
    name: article-platform

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/article_db}
    username: article_user
    password: article_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate #only checks if db schema matches expectations, doesnt edit
    show-sql: true #prints sql in terminal

    properties:
      hibernate:
        format_sql: true # sql logs readable

  flyway:
    enabled: true
    locations: classpath:db/migration #migration file folder

  devtools:
    restart:
      exclude: db.migration

  logging:
    level: INFO

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

            scope:
              - profile
              - email

            authorization-grant-type: authorization_code  # FIXED

            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      time-to-live: 600000