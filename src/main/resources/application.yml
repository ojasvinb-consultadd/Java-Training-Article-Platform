spring:
  application:
    name: article-platform

  # --- Database ---
  datasource:
    # Local default: localhost, Production: injected via env var
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/article_db}
    username: ${SPRING_DATASOURCE_USERNAME:article_user}
    password: ${SPRING_DATASOURCE_PASSWORD:article_password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  # --- Security & OAuth ---
  security:
    admin-email: ${ADMIN_EMAIL:ojasvin.b@consultadd.com}
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # --- Caching (Redis) ---
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      connect-timeout: 5000
      timeout: 5000
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false} # Default to false locally, set true in Prod
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  cache:
    type: redis
    redis:
      cache-null-values: false

# --- Infrastructure & Observability ---
server:
  forward-headers-strategy: native # Critical for production proxies/ALB

logging:
  level:
    root: INFO
    com.ojasvinC.article_platform: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %5level [%X{requestId}] %logger{36} : %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    distribution:
      percentiles-histogram:
        search.query.latency: true
        http.server.requests: true

aws:
  region: ${AWS_REGION:ap-south-1}

  s3:
    bucket-name: ${S3_BUCKET_NAME}

  sqs:
    queue-url: ${SQS_QUEUE_URL}