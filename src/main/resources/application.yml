spring:
  application:
    name: article-platform

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/article_db}
    username: article_user
    password: article_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  devtools:
    restart:
      exclude: db/migration # Note: Fixed dot to slash for classpath matching
      enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  # Connection settings ONLY
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  # Cache behavior settings LIVE HERE
  cache:
    type: redis # Explicitly tells Spring to use Redis for caching
    redis:
      time-to-live: 2h # Global fallback TTL
      cache-null-values: false
      config:
        search:
          time-to-live: 30m # 30 mins for search cache
        articles:
          time-to-live: 1h  # 1 hour for articles cache
        allArticles:
          time-to-live: 1h # 1 hour for articles cache

logging:
  level:
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %5level [%X{requestId}] %logger{36} : %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics # Expose the prometheus scraping endpoint
  metrics:
    distribution:
      percentiles-histogram:
        search.query.latency: true # Forces Micrometer to create histogram buckets for your timer